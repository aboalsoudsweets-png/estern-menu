<!DOCTYPE html>
<html lang="ar" dir="ltr" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABU ALSOUD | منيو الحلويات الشرقي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css?v=1.2" />
</head>
<body>

  <div id="loading-screen">
    <div class="loading-content">
      <h1 class="loading-title">ABU ALSOUD</h1>
      <p>...جاري التحضير</p>
    </div>
  </div>

  <nav id="navbar">
    <div class="nav-logo"><span>ABU ALSOUD</span></div>
    <div style="display: flex; align-items: center; gap: 1rem;">
      
     
    </div>
  </nav>

<section id="menu" style="padding-top: 100px;">
  <div class="menu-header" style="text-align: center; margin-bottom: 30px;">
    <img src="logo.png" alt="Logo" class="main-logo" style="max-width: 280px; height: auto;">
    <h2 dir="rtl" style="color: #d4af37; font-family: 'Cairo', sans-serif; margin-top: 15px; font-weight: 700; font-size: 1.4rem; margin-bottom: 5px;">
      أهلاً بكم في حلويات أبو السعود العربية
    </h2>
    
    <p dir="rtl" style="color: #ffffff; font-family: 'Cairo', sans-serif; font-weight: 400; font-size: 1.1rem; margin-top: 0;">
      اختر من قائمة الأصناف
    </p>
  </div>

 <div class="filters" dir="rtl" style="text-align:center; margin-bottom: 40px; display: flex; flex-wrap: wrap; justify-content: center; gap: 12px;">
    <button class="filter-btn" data-filter="konafa" style="border-radius: 4px !important;">كنافة</button>
    <button class="filter-btn" data-filter="baqlawa" style="border-radius: 4px !important;">بقلاوة</button>
    
    <div style="flex-basis: 100%; height: 0;"></div> 
    <button class="filter-btn" data-filter="namora" style="border-radius: 4px !important;">نمورة</button>
  </div>
 <div id="sub-filters-container" dir="rtl" style="text-align:center; margin-bottom: 30px; display: none; flex-wrap: wrap; justify-content: center; gap: 10px;">
 </div>
  

  
  <div class="drinks-grid" id="drinks-grid"></div>
</section>

<div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-box">
      <img id="modal-img" src="" />
      <div class="modal-body" dir="rtl">
        <button class="modal-close" id="modal-close">✕</button>
        <h2 id="modal-name-ar"></h2>
        <p id="modal-name-en"></p>
        <div class="modal-price-box"><span id="modal-price"></span> ج.م</div>
        <p id="modal-desc"></p>
        <ul id="modal-ing-list"></ul>
        <button class="order-btn" id="order-btn">عرض السعر</button>
      </div>
    </div>
  </div>


    

        
  <div id="toast" class="toast hidden"></div>
  <script src="script.js"></script>


  <footer class="main-footer">
  <div class="footer-content">
    <div class="establishment-date">
      <p>تأسس عام ١٨٩٦ م</p>
      <p>أبو السعود ©</p>
    </div>

    <div class="social-links">
      <a href="https://www.instagram.com/abusaudsweets?igsh=MTJpMnNqcm14dXVvMw==" target="_blank" aria-label="Instagram">
        <i class="fab fa-instagram"></i>
      </a>
      <a href="https://www.facebook.com/share/1JqpvBfRoH/" target="_blank" aria-label="Facebook">
        <i class="fab fa-facebook-f"></i>
      </a>
    </div>
  </div>
</footer>




<div id="weight-modal-overlay" class="modal-overlay hidden">
    <div class="modal-box" style="max-width: 350px;">
        <div class="modal-body" dir="rtl" style="text-align: center;">
            <button class="modal-close" id="weight-modal-close">✕</button>
            <h3 style="color: #d4af37; margin-bottom: 20px; font-family: 'Cairo', sans-serif;">اختر الكمية المطلوبة</h3>

            <div id="weight-price" style="color:#d4af37; font-size:18px; margin-bottom:10px;"> 0 ج.م</div>
          
            <div class="weight-options" style="display: flex; flex-direction: column; gap: 10px;">

              
                <button class="weight-btn" data-multiplier="1" style="background: #444; color: white; padding: 12px; border: 1px solid #d4af37; border-radius: 8px; cursor: pointer; font-family: 'Cairo';">
                    ١ كيلو 
                </button>
                <button class="weight-btn" data-multiplier="0.5" style="background: #444; color: white; padding: 12px; border: 1px solid #d4af37; border-radius: 8px; cursor: pointer; font-family: 'Cairo';">
                    نصف كيلو 
                </button>
                <button class="weight-btn" data-multiplier="0.25" style="background: #444; color: white; padding: 12px; border: 1px solid #d4af37; border-radius: 8px; cursor: pointer; font-family: 'Cairo';">
                    ربع كيلو 
                </button>
              <button class="weight-btn" data-multiplier="1.25" style="background: #444; color: white; padding: 12px; border: 1px solid #d4af37; border-radius: 8px; cursor: pointer; font-family: 'Cairo';">
                كيلو وربع
                </button>

              <button class="weight-btn" data-multiplier="1.5" style="background: #444; color: white; padding: 12px; border: 1px solid #d4af37; border-radius: 8px; cursor: pointer; font-family: 'Cairo';">
                كيلو ونص 
               </button>
            </div>
         
        </div>
    </div>
</div>
  

  
  
</body>
</html>
